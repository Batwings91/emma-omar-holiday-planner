  .split-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }

  .bar-omar { background: #6BAF82; transition: width 0.4s; }
  .bar-emma { background: #E8A667; transition: width 0.4s; }
  .pct-row { display: flex; justify-content: space-between; margin-top: 4px; margin-bottom: 8px; }
  .pct-omar { font-size: 16px; font-weight: 800; color: #4A8C62; }
  .pct-emma { font-size: 16px; font-weight: 800; color: #C67A3C; }
  .pct-sub { font-size: 10px; color: #999; }

  .stat { padding: 3px 7px; border-radius: 6px; text-align: center; flex: 1; }

  .info-box { margin-top: 10px; margin-bottom: 10px; padding: 8px 10px; border-radius: 8px; background: #F8F9FB; border: 1px solid #EAEDF2; font-size: 11px; line-height: 1.7; color: #666; }
  .agreed-box { padding: 12px; border-radius: 10px; background: #DDEBF7; border: 1.5px solid #4472C4; margin-bottom: 10px; }
  .partial-box { padding: 10px; border-radius: 10px; background: #FFF8ED; border: 1.5px solid #ED7D31; margin-bottom: 10px; }

  .proposal-box.emma { background: #FEF6EF; border: 1.5px solid #FCE4D6; }
  .draft-box { padding: 14px; border-radius: 10px; background: #FAFBFF; border: 1.5px solid #4472C4; margin-bottom: 10px; }

  .night-input.emma { border: 2px solid #E8A667; background: #FEF6EF; }

  .term-row.event { background: #F0E6FF; border: 1px solid #C4A8E0; }

  return new Promise(function(resolve) {
    if (!db) { resolve(null); return; }
    db.ref(path).once("value").then(function(snap) { resolve(snap.val()); }).catch(function() { resolve(null); });
  });
}
function fbSet(path, val) {
  return new Promise(function(resolve) {
    if (!db) { resolve(false); return; }
    db.ref(path).set(val).then(function() { resolve(true); }).catch(function() { resolve(false); });
  });
}
function fbListen(path, cb) {
  if (!db) return function(){};
  const ref = db.ref(path);
  ref.on("value", function(snap) { cb(snap.val()); });
  return function() { ref.off("value"); };
}

const TODAY = new Date().toISOString().split("T")[0];
function fmtDate(d){if(!d)return"";return new Date(d+"T12:00:00").toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});}
function fmtShort(d){if(!d)return"";return new Date(d+"T12:00:00").toLocaleDateString("en-GB",{day:"numeric",month:"short"});}
function fmtMed(d){if(!d)return"";return new Date(d+"T12:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"});}
function daysUntil(d){return Math.ceil((new Date(d+"T00:00:00")-new Date(TODAY+"T00:00:00"))/86400000);}
function nm(w){return w==="omar"?"Omar":"Emma";}
function getNextHoliday(){return HOLIDAYS.find(function(h){return daysUntil(h.availEnd)>=0;})||null;}

function Bar({omar,emma,total}) {
  var op=total>0?(omar/total)*100:0, ep=total>0?(emma/total)*100:0;
  return React.createElement("div",{className:"bar-wrap"},
    React.createElement("div",{className:"bar-omar",style:{width:op+"%"}}),
    React.createElement("div",{className:"bar-emma",style:{width:ep+"%"}})
  );
}

function SplitBox({label,tO,tE,tA,unal,color}) {
  var oP=tA>0?Math.round((tO/tA)*100):0, eP=tA>0?100-oP:0;
  return (
    <div className="split-box" style={{border:"1.5px solid "+color+"30"}}>
      <div className="split-label" style={{color:color}}>{label}</div>
      <Bar omar={tO} emma={tE} total={tA} />
      <div className="pct-row">
        <span><span className="pct-omar">{oP}%</span> <span className="pct-sub">({tO}n)</span></span>
        <span><span className="pct-sub">({tE}n)</span> <span className="pct-emma">{eP}%</span></span>
      </div>
      <div className="stat-row">
        <div className="stat" style={{background:"#F0FAF3",border:"1px solid #C6EFCE"}}><div className="stat-val" style={{color:"#4A8C62"}}>{tO}</div><div className="stat-lbl" style={{color:"#4A8C62"}}>OMAR</div></div>
        <div className="stat" style={{background:"#FEF6EF",border:"1px solid #FCE4D6"}}><div className="stat-val" style={{color:"#C67A3C"}}>{tE}</div><div className="stat-lbl" style={{color:"#C67A3C"}}>EMMA</div></div>
        <div className="stat" style={{background:"#F5F5F5",border:"1px solid #E0E0E0"}}><div className="stat-val" style={{color:"#999"}}>{unal}</div><div className="stat-lbl" style={{color:"#999"}}>OPEN</div></div>
      </div>
    </div>
  );
}

function TermDatesPanel({termDates, onTermUpdate}) {
  var [pdfText, setPdfText] = useState(null);
  var [pdfLoading, setPdfLoading] = useState(false);
  var [proposedChanges, setProposedChanges] = useState(null);
  var [editIdx, setEditIdx] = useState(null);
  var [editDraft, setEditDraft] = useState({});
  var years = ["2025/26","2026/27"];

  async function handlePdfUpload(e) {
    var file = e.target.files[0];
    if (!file || !window.pdfjsLib) return;
    setPdfLoading(true);
    setProposedChanges(null);
    try {
      var arrayBuffer = await file.arrayBuffer();
      var pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
      var allText = "";
      for (var i = 1; i <= pdf.numPages; i++) {
        var page = await pdf.getPage(i);
        var content = await page.getTextContent();
        allText += content.items.map(function(item){return item.str;}).join(" ") + "\n";
      }
      setPdfText(allText);
      // Parse and compare
      var changes = parsePdfChanges(allText);
      if (changes.length > 0) setProposedChanges(changes);
    } catch(err) {
      setPdfText("Error: " + err.message);
    }
    setPdfLoading(false);
  }

  function parsePdfChanges(text) {
    var changes = [];
    var lines = text.split(/\n|(?=\b(?:Mon|Tue|Wed|Thur|Fri|Sat|Sun)\w*\s+\d)/i);
    var months = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11,january:0,february:1,march:2,april:3,june:5,july:6,august:7,september:8,october:9,november:10,december:11};
    // Detect current context month from section headers
    var ctxMonth = -1; var ctxYear = 2026;
    var keywords = [
      {pat:/half\s*term/i, type:"holiday"},
      {pat:/holiday/i, type:"holiday"},
      {pat:/inset/i, type:"inset"},
      {pat:/bank\s*holiday/i, type:"inset"},
      {pat:/school\s*(start|open)/i, type:"term"},
      {pat:/last\s*day/i, type:"term"},
      {pat:/trip|residential|pgl|bowles/i, type:"event"},
      {pat:/sports?\s*day/i, type:"event"},
      {pat:/show|performance|concert|pantomime|panto/i, type:"event"},
      {pat:/photograph/i, type:"event"},
      {pat:/fair/i, type:"event"},
      {pat:/sats/i, type:"event"},
      {pat:/service|thanksgiving|leavers/i, type:"event"},
    ];

    for (var i = 0; i < lines.length; i++) {
      var line = lines[i].trim();
      if (!line || line.length < 3) continue;
      // Detect month context
      for (var mk in months) {
        if (line.toLowerCase().indexOf(mk) === 0 && line.length < 15) { ctxMonth = months[mk]; }
      }
      // Look for date patterns
      var dateMatch = line.match(/(\d{1,2})(?:st|nd|rd|th)/i);
      if (!dateMatch) continue;
      var day = parseInt(dateMatch[1]);
      if (day < 1 || day > 31 || ctxMonth < 0) continue;
      // Determine type
      var detectedType = "event";
      for (var k = 0; k < keywords.length; k++) {
        if (keywords[k].pat.test(line)) { detectedType = keywords[k].type; break; }
      }
      var dateStr = ctxYear + "-" + String(ctxMonth+1).padStart(2,"0") + "-" + String(day).padStart(2,"0");
      // Check end date
      var endMatch = line.match(/[-–]\s*(?:Mon|Tue|Wed|Thur|Fri|Sat|Sun)\w*\s+(\d{1,2})(?:st|nd|rd|th)/i);
      var endDateStr = endMatch ? ctxYear + "-" + String(ctxMonth+1).padStart(2,"0") + "-" + String(parseInt(endMatch[1])).padStart(2,"0") : dateStr;
      // Clean up event name
      var eventName = line.replace(/^(?:Mon|Tue|Wed|Thur|Fri|Sat|Sun)\w*\s+\d{1,2}(?:st|nd|rd|th)\s*/i, "")
                         .replace(/^[-–]\s*(?:Mon|Tue|Wed|Thur|Fri|Sat|Sun)\w*\s+\d{1,2}(?:st|nd|rd|th)\s*/i, "")
                         .replace(/^\s*[-–]\s*/, "").trim();
      if (!eventName) eventName = line.substring(0, 60);
      // Check if this matches an existing entry
      var existingMatch = null;
      for (var j = 0; j < termDates.length; j++) {
        var td = termDates[j];
        if (td.start === dateStr || (td.period.toLowerCase().indexOf(eventName.toLowerCase().substring(0,10)) >= 0 && td.start.substring(0,7) === dateStr.substring(0,7))) {
          existingMatch = td;
          break;
        }
      }
      var status = existingMatch ? (existingMatch.start === dateStr && existingMatch.end === endDateStr ? "match" : "changed") : "new";
      if (status !== "match") {
        changes.push({ date: dateStr, endDate: endDateStr, name: eventName, type: detectedType, status: status, existing: existingMatch, line: line.substring(0,80) });
      }
    }
    return changes;
  }

  function acceptChange(idx) {
    var c = proposedChanges[idx];
    if (onTermUpdate) {
      var newId = "pdf_" + Date.now() + "_" + idx;
      var newEntry = {id: newId, year: "2025/26", period: c.name, start: c.date, end: c.endDate, type: c.type};
      onTermUpdate(termDates.concat([newEntry]));
    }
    setProposedChanges(proposedChanges.filter(function(_,i){return i!==idx;}));
  }

  function rejectChange(idx) {
    setProposedChanges(proposedChanges.filter(function(_,i){return i!==idx;}));
  }

  return (
    <div style={{background:"#fff",borderRadius:14,padding:16,border:"1px solid #E8E8E8"}}>
      <h3 style={{fontSize:15,fontWeight:700,margin:"0 0 4px"}}>Keston CE Primary — Term Dates</h3>
      <p style={{fontSize:11,color:"#AAA",margin:"0 0 2px"}}>Official school calendar dates. Verified from school documents only.</p>
      <p style={{fontSize:10,color:"#4472C4",margin:"0 0 14px",fontStyle:"italic"}}>Sources: Dates for Diaries Keston 2025-2026 V4 · Term Dates 2025-2026 · Revised Term Dates 2026-2027 (Mrs Ardern, 9 Feb 2026)</p>
      {years.map(function(y){return (
        <div key={y} style={{marginBottom:16}}>
          <div style={{fontSize:12,fontWeight:700,color:"#1F4E79",marginBottom:6,padding:"4px 8px",background:"#D6E4F0",borderRadius:6}}>{y}</div>
          {termDates.filter(function(t){return t.year===y;}).map(function(t){return (
            <div key={t.id} className={"term-row "+t.type}>
              <span style={{fontSize:11,fontWeight:t.type==="holiday"?700:400,flex:"1 1 140px"}}>{t.period}</span>
              <span style={{fontSize:10,color:"#888",whiteSpace:"nowrap"}}>{fmtShort(t.start)}{t.end&&t.end!==t.start?" → "+fmtShort(t.end):""}</span>
            </div>
          );})}
        </div>
      );})}

      <div className="pdf-upload">
        <div style={{fontSize:12,fontWeight:700,color:"#1F4E79",marginBottom:6}}>📄 Upload Keston Dates for Diaries</div>
        <p style={{fontSize:11,color:"#888",margin:"0 0 8px"}}>Upload the latest PDF. Dates will be parsed and compared against the current calendar.</p>
        <input type="file" accept=".pdf" onChange={handlePdfUpload} />
        {pdfLoading && <p style={{fontSize:11,color:"#4472C4",marginTop:8}}>Reading and parsing PDF...</p>}

        {proposedChanges && proposedChanges.length > 0 && <div style={{marginTop:12}}>
          <div style={{fontSize:12,fontWeight:700,color:"#C00",marginBottom:8}}>📋 {proposedChanges.length} proposed change{proposedChanges.length>1?"s":""} detected:</div>
          {proposedChanges.map(function(c, idx) {
            return <div key={idx} style={{padding:"8px 10px",marginBottom:6,borderRadius:8,background:c.status==="new"?"#E2EFDA":"#FFF2CC",border:"1px solid "+(c.status==="new"?"#A3C985":"#E8C84A")}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                <div style={{flex:1}}>
                  <span className="badge" style={{background:c.status==="new"?"#70AD47":"#ED7D31",color:"#fff",marginRight:6}}>{c.status==="new"?"NEW":"CHANGED"}</span>
                  <strong style={{fontSize:12}}>{c.name}</strong>
                  <div style={{fontSize:10,color:"#888",marginTop:2}}>{fmtShort(c.date)}{c.endDate!==c.date?" → "+fmtShort(c.endDate):""} · Type: {c.type}</div>
                  {c.existing && <div style={{fontSize:10,color:"#ED7D31",marginTop:2}}>Current: {c.existing.period} ({fmtShort(c.existing.start)} → {fmtShort(c.existing.end)})</div>}
                  <div style={{fontSize:9,color:"#BBB",marginTop:2}}>Source: "{c.line}"</div>
                </div>
                <div style={{display:"flex",gap:4,flexShrink:0}}>
                  <button onClick={function(){acceptChange(idx);}} style={{padding:"4px 10px",borderRadius:6,fontSize:10,fontWeight:700,background:"#70AD47",color:"#fff",border:"none",cursor:"pointer"}}>✓ Add</button>
                  <button onClick={function(){rejectChange(idx);}} style={{padding:"4px 10px",borderRadius:6,fontSize:10,fontWeight:700,background:"#C00",color:"#fff",border:"none",cursor:"pointer"}}>✗ Skip</button>
                </div>
              </div>
            </div>;
          })}
        </div>}

        {proposedChanges && proposedChanges.length === 0 && pdfText && <div style={{marginTop:10,padding:"8px 10px",borderRadius:8,background:"#E2EFDA",border:"1px solid #A3C985",fontSize:11,color:"#375623"}}>✓ All detected dates match the current calendar. No changes needed.</div>}

        {pdfText && <div style={{marginTop:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
            <span style={{fontSize:11,fontWeight:700,color:"#375623"}}>Raw extracted text:</span>
            <button onClick={function(){navigator.clipboard.writeText(pdfText).then(function(){alert("Copied!");});}} style={{padding:"4px 12px",borderRadius:6,fontSize:11,fontWeight:700,background:"#4472C4",color:"#fff",border:"none",cursor:"pointer"}}>📋 Copy</button>
          </div>
          <div className="pdf-output">{pdfText}</div>
          <div style={{marginTop:6,padding:"6px 10px",borderRadius:6,background:"#DDEBF7",fontSize:10,color:"#1F4E79"}}>
            For complex changes, copy the text and paste into <a href="https://claude.ai" target="_blank" style={{color:"#4472C4"}}>Claude AI</a> for intelligent parsing.
          </div>
        </div>}
      </div>
    </div>
  );
}

function CalendarView({allData, selectedHoliday}) {
  // Alternating weekends: Emma starts Fri 17 Apr 2026 (6pm) to Sun 19 Apr (6pm)
  var BASE_FRIDAY = new Date("2026-04-17T12:00:00");

  function getWeekendParent(dateStr) {
    var dt = new Date(dateStr+"T12:00:00");
    var dow = dt.getDay(); // 0=Sun,5=Fri,6=Sat
    if (dow !== 0 && dow !== 5 && dow !== 6) return null; // Not a weekend day
    // Find the Friday of this weekend
    var fri = new Date(dt);
    if (dow === 6) fri.setDate(fri.getDate() - 1); // Sat → Fri
    if (dow === 0) fri.setDate(fri.getDate() - 2); // Sun → Fri
    var weeksDiff = Math.round((fri - BASE_FRIDAY) / (7*86400000));
    return weeksDiff % 2 === 0 ? "emma" : "omar";
  }

  function getDateInfo(dateStr) {
    // Check holidays first — holidays override weekends
    for (var i = 0; i < HOLIDAYS.length; i++) {
      var h = HOLIDAYS[i];
      if (dateStr >= h.availStart && dateStr <= h.availEnd) {
        var d = allData[h.id];
        var agr = (d && d.agreement) || h.agreed;
        if (agr) {
          var dayIndex = Math.ceil((new Date(dateStr+"T12:00:00") - new Date(h.availStart+"T12:00:00")) / 86400000);
          var totalDays = Math.ceil((new Date(h.availEnd+"T12:00:00") - new Date(h.availStart+"T12:00:00")) / 86400000) + 1;
          var omarDays = Math.round((agr.omar / (agr.omar + agr.emma)) * totalDays);
          var type = dayIndex < omarDays ? "omar" : "emma";
          return {type: type, tooltip: (type==="omar"?"Omar's time":"Emma's time") + " — " + h.name, holidayId: h.id};
        }
        if (h.partialAgreed) return {type:"partial", tooltip:"Partially agreed — " + h.name, holidayId: h.id};
        var prop = d && d.proposals && (d.proposals.omar || d.proposals.emma);
        if (prop) return {type:"partial", tooltip:"Proposed — " + h.name, holidayId: h.id};
        return {type:"holiday", tooltip:"Holiday (unallocated) — " + h.name, holidayId: h.id};
      }
    }
    // Check term dates for inset/event
    for (var j = 0; j < TERM_DATES.length; j++) {
      var t = TERM_DATES[j];
      if (dateStr >= t.start && dateStr <= t.end) {
        if (t.type === "inset") return {type:"inset", tooltip:"Inset day: " + t.period, holidayId: null};
        if (t.type === "event") return {type:"event", tooltip:"School event: " + t.period.replace(/^[^\s\w]*/,""), holidayId: null};
      }
    }
    // Check alternating weekends during term time
    var wkPar = getWeekendParent(dateStr);
    if (wkPar) {
      return {type: wkPar+"-wknd", tooltip: (wkPar==="omar"?"Omar":"Emma") + "'s weekend", holidayId: null};
    }
    return {type:"term", tooltip:"Term time", holidayId: null};
  }

  // Selected holiday range
  var selStart = null, selEnd = null, selMonths = {};
  if (selectedHoliday) {
    var sh = HOLIDAYS.find(function(h){return h.id === selectedHoliday;});
    if (sh) {
      selStart = sh.availStart; selEnd = sh.availEnd;
      // Build set of months that overlap
      var sd = new Date(sh.availStart+"T12:00:00");
      var ed = new Date(sh.availEnd+"T12:00:00");
      var cur = new Date(sd);
      while (cur <= ed) {
        selMonths[cur.getFullYear()+"-"+cur.getMonth()] = true;
        cur.setMonth(cur.getMonth() + 1);
      }
    }
  }

  function renderMonth(year, month) {
    var firstDay = new Date(year, month, 1);
    var daysInMonth = new Date(year, month + 1, 0).getDate();
    var startOffset = (firstDay.getDay() + 6) % 7;
    var monthName = firstDay.toLocaleDateString("en-GB", {month:"long", year:"numeric"});
    var monthKey = year+"-"+month;
    var isSelectedMonth = !!selMonths[monthKey];
    var cells = [];
    for (var i = 0; i < startOffset; i++) {
      cells.push(React.createElement("div", {key:"e"+i, className:"cal-day empty"}));
    }
    for (var d = 1; d <= daysInMonth; d++) {
      var ds = year + "-" + String(month+1).padStart(2,"0") + "-" + String(d).padStart(2,"0");
      var info = getDateInfo(ds);
      var isToday = ds === TODAY;
      var isDimmed = selectedHoliday && !(ds >= selStart && ds <= selEnd);
      var cls = "cal-day " + info.type + (isToday ? " today" : "") + (isDimmed ? " dimmed" : "");
      cells.push(React.createElement("div", {key:d, className:cls, title:info.tooltip}, d));
    }
    return React.createElement("div", {key:monthName, className:"cal-month"+(isSelectedMonth?" selected":"")},
      React.createElement("div", {className:"cal-month-title"}, monthName),
      React.createElement("div", {className:"cal-days-header"},
        ["M","T","W","T","F","S","S"].map(function(d,i){return React.createElement("div",{key:i,className:"cal-day-label"},d);})
      ),
      React.createElement("div", {className:"cal-days"}, cells)
    );
  }

  var months = [];
  for (var y = 2026; y <= 2027; y++) {
    var startM = y === 2026 ? 3 : 0;
    var endM = y === 2027 ? 8 : 11;
    for (var m = startM; m <= endM; m++) { months.push(renderMonth(y, m)); }
  }

  return React.createElement("div", null,
    React.createElement("div", {className:"cal-legend"},
      [{c:"#C6EFCE",l:"Omar (holiday)"},{c:"#FCE4D6",l:"Emma (holiday)"},{c:"#E8F5EC",l:"Omar's weekend"},{c:"#FDF0E6",l:"Emma's weekend"},{c:"#DDEBF7",l:"Proposed/Partial"},{c:"#FFF2CC",l:"Unallocated"},{c:"#E2EFDA",l:"Inset"},{c:"#F0E6FF",l:"School event"},{c:"#F5F5F5",l:"Term"}].map(function(item){
        return React.createElement("div",{key:item.l,className:"cal-legend-item"},
          React.createElement("div",{className:"cal-legend-swatch",style:{background:item.c}}), item.l
        );
      })
    ),
    selectedHoliday && React.createElement("div", {style:{fontSize:11,color:"#C00000",marginBottom:8,fontWeight:600}},
      "Highlighting: " + (HOLIDAYS.find(function(h){return h.id===selectedHoliday;})||{}).name
    ),
    React.createElement("div", {className:"cal-grid"}, months)
  );
}

function App() {
  var [me,setMe] = useState(null);
  var [allData,setAllData] = useState({});
  var [loaded,setLoaded] = useState(false);
  var [saving,setSaving] = useState(false);
  var [lastSaved,setLastSaved] = useState(null);
  var [filter,setFilter] = useState("all");
  var [tab,setTab] = useState("holidays");
  var [selectedHoliday,setSelectedHoliday] = useState(null);
  var [openCardId,setOpenCardId] = useState(null);
  var [viewMode,setViewMode] = useState(window.innerWidth > 960 ? "desktop" : "mobile");
  var [termDates,setTermDates] = useState(TERM_DATES);
  var nextHoliday = useMemo(function(){return getNextHoliday();},[]);

  // Load and listen to Firebase
  useEffect(function(){
    var unsub = null;
    async function init(){
      // Seed Emma's proposals into initial state
      var initial = {};
      Object.keys(EMMA_SEED).forEach(function(id){
        initial[id] = {proposals:{emma:Object.assign({},EMMA_SEED[id],{timestamp:"2026-03-06T17:30:00Z"})}};
      });

      // Try loading from Firebase
      var saved = await fbGet("holidayPlanner");
      if(saved){
        // Merge: saved data takes precedence over seed
        Object.keys(initial).forEach(function(id){
          if(!saved[id]) saved[id] = initial[id];
          else if(!saved[id].proposals || !saved[id].proposals.emma) {
            saved[id].proposals = Object.assign({},saved[id].proposals||{},initial[id].proposals);
          }
        });
        setAllData(saved);
      } else {
        setAllData(initial);
      }
      setLoaded(true);

      // Load saved term dates
      var savedTerms = await fbGet("termDates");
      if (savedTerms && Array.isArray(savedTerms) && savedTerms.length > 0) {
        setTermDates(savedTerms);
      }

      // Listen for real-time updates
      unsub = fbListen("holidayPlanner", function(val){
        if(val) setAllData(val);
      });
      fbListen("termDates", function(val){
        if(val && Array.isArray(val) && val.length > 0) setTermDates(val);
      });
    }
    init();
    return function(){ if(unsub) unsub(); };
  },[]);

  function handleSave(id, hd){
    setAllData(function(prev){
      var n = Object.assign({},prev);
      n[id] = hd;
      setSaving(true);
      fbSet("holidayPlanner",n).then(function(){
        setLastSaved(new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}));
        setSaving(false);
      });
      return n;
    });
  }

  function handleTermUpdate(newTermDates) {
    setTermDates(newTermDates);
    setSaving(true);
    fbSet("termDates", newTermDates).then(function(){
      setLastSaved(new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}));
      setSaving(false);
    });
  }

  function computeAgreed(yf){
    var tO=0,tE=0,tN=0,tA=0;
    var list=yf==="all"?HOLIDAYS:HOLIDAYS.filter(function(h){return h.year===yf;});
    list.forEach(function(h){tN+=h.totalNights;var d=allData[h.id];var a=(d&&d.agreement)||h.agreed;
      if(a){tO+=a.omar;tE+=a.emma;tA+=a.omar+a.emma;}else if(h.partialAgreed){tO+=h.partialAgreed.omar;tA+=h.partialAgreed.omar;}});
    return{tO:tO,tE:tE,tN:tN,tA:tA,unal:tN-tA};
  }
  function computeProposed(yf){
    var tO=0,tE=0,tN=0,tA=0;
    var list=yf==="all"?HOLIDAYS:HOLIDAYS.filter(function(h){return h.year===yf;});
    list.forEach(function(h){tN+=h.totalNights;var d=allData[h.id];var a=(d&&d.agreement)||h.agreed;
      if(a){tO+=a.omar;tE+=a.emma;tA+=a.omar+a.emma;}
      else if(h.partialAgreed){tO+=h.partialAgreed.omar;tA+=h.partialAgreed.omar;var p=d&&d.proposals&&(d.proposals.omar||d.proposals.emma);if(p&&p.emma){tE+=p.emma;tA+=p.emma;}}
      else{var p2=d&&d.proposals&&(d.proposals.omar||d.proposals.emma);if(p2){tO+=(p2.omar||0);tE+=(p2.emma||0);tA+=(p2.omar||0)+(p2.emma||0);}}});
    return{tO:tO,tE:tE,tN:tN,tA:tA,unal:tN-tA};
  }

  var agreed = computeAgreed(filter);
  var proposed = computeProposed(filter);
  var fil = filter==="all"?HOLIDAYS:HOLIDAYS.filter(function(h){return h.year===filter;});

  if(!loaded) return <div style={{display:"flex",justifyContent:"center",alignItems:"center",height:"100vh",fontFamily:"system-ui"}}><span style={{color:"#AAA"}}>Loading...</span></div>;

  // Not configured warning
  var notConfigured = FIREBASE_CONFIG.apiKey === "YOUR_API_KEY";

  if(!me) return (
    <div className="landing" style={{fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif",background:"linear-gradient(160deg,#F5F7FA,#E8ECF2)"}}>
      <div style={{maxWidth:420}}>
        <h1 style={{fontSize:24,fontWeight:800,margin:"0 0 4px"}}>Joint Holiday Planner</h1>
        <p style={{fontSize:12,color:"#888",margin:"0 0 24px"}}>{fmtDate(TODAY)}</p>
        {notConfigured && <div style={{padding:"10px 14px",borderRadius:8,background:"#FFF2CC",border:"1px solid #ED7D31",marginBottom:16,fontSize:12,color:"#7F5F00"}}>⚠ Firebase not configured — data won't sync between devices. See setup instructions.</div>}
        {nextHoliday && <div style={{padding:"10px 16px",borderRadius:10,background:"#DDEBF7",border:"1px solid rgba(68,114,196,0.5)",marginBottom:24,display:"inline-block"}}>
          <span style={{fontSize:12,color:"#1F4E79",fontWeight:600}}>Next holiday: <strong>{nextHoliday.name}</strong> ({daysUntil(nextHoliday.availStart)<=0?"now":daysUntil(nextHoliday.availStart)+" days"})</span>
        </div>}
        <p style={{fontSize:14,color:"#666",marginBottom:20}}>Who are you?</p>
        <div style={{display:"flex",gap:16,justifyContent:"center"}}>
          <button className="who-btn omar" onClick={function(){setMe("omar");}}>Omar</button>
          <button className="who-btn emma" onClick={function(){setMe("emma");}}>Emma</button>
        </div>
        <p style={{fontSize:11,color:"#CCC",marginTop:20}}>Both parents can propose, counter-propose, and agree.<br/>All changes sync automatically.</p>
      </div>
    </div>
  );

  return (
    <div>
      <div className="banner">
        <div><span>Today: </span><strong>{fmtDate(TODAY)}</strong></div>
        {nextHoliday && <div><span>Next holiday: </span><strong>{nextHoliday.name}</strong> <span style={{fontSize:11,color:"#8BB8DE"}}>({daysUntil(nextHoliday.availStart)<=0?"now":daysUntil(nextHoliday.availStart)+" days"})</span></div>}
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:10}}>{saving?"Saving...":lastSaved||""}</span>
          <button onClick={function(){setMe(null);}} style={{padding:"3px 10px",borderRadius:7,fontSize:11,fontWeight:700,background:me==="omar"?"#F0FAF3":"#FEF6EF",border:"none",color:me==="omar"?"#4A8C62":"#C67A3C",cursor:"pointer"}}>{nm(me)} ✕</button>
        </div>
      </div>

      <div style={{maxWidth:viewMode==="desktop"?1200:700,margin:"0 auto",padding:"14px 12px 0",transition:"max-width 0.3s"}}>
        <h1>Joint Holiday Planner</h1>

        {/* View toggle */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div>
            {/* Desktop mode: two tabs */}
            {viewMode==="desktop" && <div className="btn-group" style={{marginBottom:0}}>
              <button className={"btn"+(tab!=="termdates"?" active":"")} onClick={function(){setTab("holidays");}}>Holidays & Calendar</button>
              <button className={"btn"+(tab==="termdates"?" active":"")} onClick={function(){setTab("termdates");}}>Term Dates</button>
            </div>}
            {/* Mobile mode: three tabs */}
            {viewMode==="mobile" && <div className="btn-group" style={{marginBottom:0}}>
              <button className={"btn"+(tab==="holidays"?" active":"")} onClick={function(){setTab("holidays");}}>Holidays</button>
              <button className={"btn"+(tab==="calendar"?" active":"")} onClick={function(){setTab("calendar");}}>Calendar</button>
              <button className={"btn"+(tab==="termdates"?" active":"")} onClick={function(){setTab("termdates");}}>Term Dates</button>
            </div>}
          </div>
          <div style={{display:"flex",gap:2,background:"#E8E8E8",borderRadius:6,padding:2}}>
            <button onClick={function(){setViewMode("desktop");}} style={{padding:"3px 10px",borderRadius:5,fontSize:10,fontWeight:600,border:"none",cursor:"pointer",background:viewMode==="desktop"?"#fff":"transparent",color:viewMode==="desktop"?"#333":"#999"}}>⬛ Desktop</button>
            <button onClick={function(){setViewMode("mobile");}} style={{padding:"3px 10px",borderRadius:5,fontSize:10,fontWeight:600,border:"none",cursor:"pointer",background:viewMode==="mobile"?"#fff":"transparent",color:viewMode==="mobile"?"#333":"#999"}}>📱 Mobile</button>
          </div>
        </div>

        {/* Year filter */}
        {tab!=="termdates" && <div className="btn-group">
          {["all","2025/26","2026/27"].map(function(y){return <button key={y} className={"btn"+(filter===y?" active":"")} onClick={function(){setFilter(y);}}>{y==="all"?"All":y}</button>;})}
        </div>}

        {/* Split summary */}
        {tab!=="termdates" && <div className="splits">
          <SplitBox label={"Agreed split"+(filter!=="all"?" — "+filter:"")} tO={agreed.tO} tE={agreed.tE} tA={agreed.tA} unal={agreed.unal} color="#4472C4" />
          <SplitBox label={"If all proposals accepted"+(filter!=="all"?" — "+filter:"")} tO={proposed.tO} tE={proposed.tE} tA={proposed.tA} unal={proposed.unal} color="#70AD47" />
        </div>}

        {/* Desktop: side-by-side calendar + holidays */}
        {tab!=="termdates" && viewMode==="desktop" && <div style={{display:"flex",gap:16,alignItems:"flex-start"}}>
          <div style={{flex:"1 1 340px",minWidth:280,position:"sticky",top:16,maxHeight:"calc(100vh - 32px)",overflowY:"auto"}}>
            <CalendarView allData={allData} selectedHoliday={selectedHoliday} />
          </div>
          <div style={{flex:"1 1 400px",minWidth:300}}>
            {fil.map(function(h){return <HolidayCard key={h.id} holiday={h} me={me} data={allData[h.id]||{}} onSave={handleSave} isNext={nextHoliday&&nextHoliday.id===h.id} onSelect={function(){setSelectedHoliday(selectedHoliday===h.id?null:h.id);}} isSelected={selectedHoliday===h.id} isOpen={openCardId===h.id} onToggle={function(){setOpenCardId(openCardId===h.id?null:h.id);}} />;})}
          </div>
        </div>}

        {/* Mobile: tab-switched */}
        {tab!=="termdates" && viewMode==="mobile" && tab==="calendar" && <CalendarView allData={allData} selectedHoliday={selectedHoliday} />}
        {tab!=="termdates" && viewMode==="mobile" && tab==="holidays" && <div>
          {fil.map(function(h){return <HolidayCard key={h.id} holiday={h} me={me} data={allData[h.id]||{}} onSave={handleSave} isNext={nextHoliday&&nextHoliday.id===h.id} onSelect={function(){setSelectedHoliday(selectedHoliday===h.id?null:h.id);}} isSelected={selectedHoliday===h.id} isOpen={openCardId===h.id} onToggle={function(){setOpenCardId(openCardId===h.id?null:h.id);}} />;})}
        </div>}

        {/* Term Dates tab */}
        {tab==="termdates" && <TermDatesPanel termDates={termDates} onTermUpdate={handleTermUpdate} />}

        <div style={{marginTop:20,textAlign:"center",fontSize:10,color:"#CCC",lineHeight:1.6}}>
          <p>Term dates verified from Keston CE Primary school documents only.</p>
          <p>All changes sync automatically between both parents.</p>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
